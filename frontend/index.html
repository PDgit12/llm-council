<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Parallels — Cross-Domain Analogy Engine. Discover hidden connections across domains and turn any problem into breakthrough insights." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <title>Parallels — Cross-Domain Analogy Engine</title>
</head>

<body>
  <div id="root"></div>
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      const root = document.getElementById('root');
      root.innerHTML = `
        <div style="color: red; padding: 20px; font-family: monospace; background: #fff;">
          <h1>💥 Global Startup Error</h1>
          <p><strong>Message:</strong> ${message}</p>
          <p><strong>Source:</strong> ${source}:${lineno}:${colno}</p>
          <p><strong>Stack:</strong> ${error ? error.stack : 'No stack trace'}</p>
        </div>
      `;
    };
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
